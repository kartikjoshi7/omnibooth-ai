# Google Cloud Build Configuration
# Automatically tests, builds, and deploys OmniBooth AI to Google Cloud Run
steps:
  # Step 0: Run backend tests
  - name: 'python:3.10-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'pip install -r backend/requirements.txt && pytest backend/test_main.py -v'
    id: 'Run-Backend-Tests'
  # Step 1: Build Docker container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/omnibooth-ai', '.']
    id: 'Build-Google-Cloud-Container'
  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/omnibooth-ai']
    id: 'Push-To-Google-Container-Registry'
  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'omnibooth-ai', '--image', 'gcr.io/$PROJECT_ID/omnibooth-ai', '--region', 'asia-south1']
    id: 'Deploy-To-Google-Cloud-Run'